<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
.navbar{background:#2874f0;color:white;padding:18px 30px;display:flex;gap:25px;align-items:center}
.logo{font-size:30px;font-weight:bold;cursor:pointer}
.nav-btn{background:#ff9f00;color:white;padding:12px 20px;border-radius:5px;cursor:pointer}
.section{background:white;margin:25px;padding:25px;border-radius:8px}
.method{border:1px solid #ddd;padding:15px;margin:12px 0;border-radius:6px}
button{border:none;padding:14px 25px;border-radius:5px;color:white;background:#388e3c;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo" onclick="location.href='/'">MyKart</div>
    <div class="nav-btn" onclick="location.href='/page/products'">Products</div>
    <div class="nav-btn" onclick="location.href='/page/cart'">Cart</div>
</div>

<div class="section">
    <h1>Payment</h1>

    <h2 id="amount">Amount: ₹0</h2>

    <div class="method">
        <input type="radio" name="pay" checked> Cash on Delivery
    </div>

    <div class="method">
        <input type="radio" name="pay"> UPI
    </div>

    <div class="method">
        <input type="radio" name="pay"> Debit / Credit Card
    </div>

    <button onclick="payNow()">Pay Now</button>
</div>

<script>
const total = localStorage.getItem("last_order_total") || 0;
document.getElementById("amount").innerText = "Amount: ₹" + total;

function payNow(){
    alert("Payment successful ✅ Order confirmed!");
    localStorage.removeItem("last_order_total");
    location.href="/page/products";
}
</script>

</body>
</html>

<input id="searchText" placeholder="Search product">
<input id="minPrice" placeholder="Min price">
<input id="maxPrice" placeholder="Max price">

<select id="sortPrice">
    <option value="">Sort</option>
    <option value="low">Price Low to High</option>
    <option value="high">Price High to Low</option>
</select>

<button onclick="loadProducts()">Apply Filter</button>
