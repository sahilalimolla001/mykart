<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
.navbar{background:#2874f0;color:white;padding:18px 30px;display:flex;gap:25px;align-items:center}
.logo{font-size:30px;font-weight:bold;cursor:pointer}
.nav-btn{background:#ff9f00;color:white;padding:12px 20px;border-radius:5px;cursor:pointer}
.section{background:white;margin:25px;padding:25px;border-radius:8px}
input{display:block;width:95%;padding:14px;margin:12px 0;font-size:16px}
button{border:none;padding:14px 25px;border-radius:5px;color:white;background:#fb641b;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo" onclick="location.href='/'">MyKart</div>
    <div class="nav-btn" onclick="location.href='/page/products'">Products</div>
    <div class="nav-btn" onclick="location.href='/page/cart'">Cart</div>
</div>

<div class="section">
    <h1>Checkout</h1>

    <h3>Delivery Address</h3>

    <input id="address" placeholder="Full Address">
    <input id="city" placeholder="City">
    <input id="phone" placeholder="Phone Number">

    <button onclick="checkout()">Place Order</button>
</div>

<script>
const API = "http://127.0.0.1:5000";

async function checkout(){
    const token = localStorage.getItem("token");

    if(!token){
        alert("Login first");
        location.href="/page/login";
        return;
    }

    const res = await fetch(API + "/cart/checkout", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body:JSON.stringify({
            address:address.value,
            city:city.value,
            phone:phone.value
        })
    });

    const data = await res.json();

    if(data.msg === "Checkout successful"){
        alert("Order placed successfully ✅");
        localStorage.setItem("last_order_total", data.total_amount);
        location.href="/page/payment";
    } else {
        alert(JSON.stringify(data));
    }
}
</script>

</body>
</html>
