<!DOCTYPE html>
<html>
<head>
    <title>MyKart Products</title>
    <style>
        body{margin:0;font-family:Arial;background:#f1f3f6}
        .navbar{background:#2874f0;color:white;padding:18px 30px;display:flex;gap:25px;align-items:center}
        .logo{font-size:30px;font-weight:bold;cursor:pointer}
        .search{flex:1;display:flex}
        .search input{width:100%;padding:16px;font-size:17px;border:none;border-radius:5px}
        .nav-btn{background:#ff9f00;color:white;padding:14px 25px;border-radius:5px;font-weight:bold;cursor:pointer}
        .section{background:white;margin:25px;padding:25px;border-radius:8px}
        .products{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px;margin-top:25px}
        .card{background:white;border:1px solid #ddd;border-radius:8px;padding:20px;box-shadow:0 2px 8px #ddd}
        .card img{width:100%;height:220px;object-fit:contain;background:#fafafa}
        .card h3{font-size:22px;margin-bottom:8px}
        .card p{font-size:16px;color:#444}
        .price{color:#168a36!important;font-size:24px!important;font-weight:bold}
        button{border:none;padding:13px 22px;margin:5px;border-radius:5px;color:white;font-weight:bold;cursor:pointer}
        .cart-btn{background:#ff9f00}
        .buy-btn{background:#2874f0}
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo" onclick="location.href='/'">MyKart</div>

    <div class="search">
        <input id="searchText" placeholder="Search products">
    </div>

    <div class="nav-btn" onclick="location.href='/page/login'">Login</div>
    <div class="nav-btn" onclick="location.href='/page/products'">Products</div>
    <div class="nav-btn" onclick="location.href='/page/cart'">Cart 🛒</div>
</div>

<div class="section">
    <h1>All Products</h1>
    <button class="cart-btn" onclick="loadProducts()">Load Products</button>

    <div id="product_list" class="products"></div>
</div>

<script>
const API = "http://127.0.0.1:5000";

async function loadProducts(){
    const res = await fetch(API + "/products");
    const data = await res.json();

    product_list.innerHTML = "";

    if(data.length === 0){
        product_list.innerHTML = "<h3>No approved products found</h3>";
        return;
    }

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.image_url || 'https://via.placeholder.com/300x220?text=Product'}">
            <h3>${p.name}</h3>
            <p>${p.description || 'No description available'}</p>
            <p class="price">₹${p.price}</p>
            <button class="cart-btn" onclick="addToCart(${p.id})">Add to Cart</button>
            <button class="buy-btn" onclick="buyNow(${p.id})">Buy Now</button>
            <h3 onclick="openProduct(${p.id})">${p.name}</h3>
        `;

        product_list.appendChild(div);
    });
}

function openProduct(id){
    location.href="/page/product/" + id;
}

async function addToCart(productId){
    const token = localStorage.getItem("token");

    if(!token){
        alert("Login first");
        location.href="/page/login";
        return;
    }

    const res = await fetch(API + "/cart/add", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body:JSON.stringify({
            product_id:productId,
            quantity:1
        })
    });

    const data = await res.json();
    alert(JSON.stringify(data));
}

function buyNow(productId){
    localStorage.setItem("buy_product_id", productId);
    addToCart(productId);
    setTimeout(()=>location.href="/page/checkout", 500);
}

loadProducts();
</script>

</body>
</html>
