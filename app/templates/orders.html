<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="icon" href="data:,">


<!DOCTYPE html>
<html>
<head>
<title>Live Order Tracking</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
.navbar{background:#2874f0;color:white;padding:18px 30px}
.logo{font-size:30px;font-weight:bold;cursor:pointer}
.section{background:white;margin:25px;padding:25px;border-radius:8px}
.order{background:#fff;padding:20px;margin:18px 0;border:1px solid #ddd;border-radius:8px}
.track{display:flex;justify-content:space-between;margin-top:25px;position:relative}
.track::before{content:"";position:absolute;top:18px;left:0;right:0;height:4px;background:#ddd;z-index:0}
.step{position:relative;z-index:1;text-align:center;width:25%}
.circle{width:38px;height:38px;border-radius:50%;background:#ddd;margin:auto;line-height:38px;color:white;font-weight:bold}
.active .circle{background:#2874f0}
.done .circle{background:#388e3c}
.label{margin-top:8px;font-weight:bold}
button{background:#ff9f00;color:white;border:none;padding:10px 18px;cursor:pointer}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo" onclick="location.href='/'">MyKart Orders</div>
</div>

<div class="section">
    <h1>Live Order Tracking</h1>
    <button onclick="loadOrders()">Refresh Tracking</button>
    <div id="ordersBox"></div>
</div>

<script>
const API = "http://127.0.0.1:5000";

function stepClass(orderStatus, step){
    const steps = ["pending", "confirmed", "shipped", "delivered"];
    const currentIndex = steps.indexOf(orderStatus);
    const stepIndex = steps.indexOf(step);

    if(orderStatus === "cancelled") return "";

    if(stepIndex < currentIndex) return "done";
    if(stepIndex === currentIndex) return "active";
    return "";
}
async function cancelOrder(orderId){
    const token = localStorage.getItem("token");

    const res = await fetch(API + "/cancel-order/" + orderId, {
        method:"PUT",
        headers:{
            "Authorization":"Bearer " + token
        }
    });

    const data = await res.json();
    alert(JSON.stringify(data));
    loadOrders();
}
function showMap(orderId){
    const kolkata = [22.5726, 88.3639];

    const map = L.map("map-" + orderId).setView(kolkata, 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
    }).addTo(map);

    L.marker(kolkata).addTo(map)
        .bindPopup("Delivery location")
        .openPopup();
}


async function loadOrders(){
    const token = localStorage.getItem("token");

    if(!token){
        alert("Login first");
        location.href="/page/login";
        return;
    }

    const res = await fetch(API + "/my-orders", {
        headers:{
            "Authorization":"Bearer " + token
        }
    });


    const steps = ["pending","confirmed","shipped","out_for_delivery","delivered"];

    const data = await res.json();
    ordersBox.innerHTML = "";

    if(data.msg){
        alert(data.msg);
        return;
    }

    data.forEach(o=>{
        ordersBox.innerHTML += `
            <div class="order">
                <h2>Order #${o.id}</h2>
                <p>Product ID: ${o.product_id}</p>
                <p>Quantity: ${o.quantity}</p>
                <p>Total: ₹${o.total_price}</p>

                
                <div id="map-${o.id}" class="map"></div>
                <p><b>Status:</b> ${o.status}</p>     
                ${
                    o.status === "cancelled"
                    ? "<h3 style='color:red'>Order Cancelled</h3>"
                    : `
                    <div class="track">
                        <div class="step ${stepClass(o.status, "pending")}">
                            <div class="circle">1</div>
                            <div class="label">Pending</div>
                        </div>

                        <div class="step ${stepClass(o.status, "confirmed")}">
                            <div class="circle">2</div>
                            <div class="label">Confirmed</div>
                        </div>

                        <div class="step ${stepClass(o.status, "shipped")}">
                            <div class="circle">3</div>
                            <div class="label">Shipped</div>
                        </div>

                        <div class="step ${stepClass(o.status, "delivered")}">
                            <div class="circle">4</div>
                            <div class="label">Delivered</div>
                        </div>
                    </div>
                    `
                }
            </div>
         `;
   
   
   setTimeout(() => {
            showMap(o.id);
        }, 100);
     });
}


loadOrders();

setInterval(loadOrders, 5000);
</script>

</body>
</html>
